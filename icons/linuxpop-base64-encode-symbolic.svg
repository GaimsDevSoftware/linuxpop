<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Letter shape (A triangle) → arrow → binary blocks -->
  <g fill="#f0f0f0" fill-rule="evenodd">
    <!-- Capital A on the left -->
    <path d="M0.5,13.5 L3,3.5 L4,3.5 L6.5,13.5 L5.2,13.5 L4.8,11.5 L2.2,11.5 L1.8,13.5 Z
             M2.45,10 L4.55,10 L3.5,6.5 Z"/>
    <!-- Arrow -->
    <path d="M7,8 L9.5,8 L9.5,7 L11,8.5 L9.5,10 L9.5,9 L7,9 Z"/>
    <!-- Binary blocks: "0" donut + "1" bar -->
    <path d="M12.5,9.5
             a 1.2,1.6 0 1,0 0,3.2
             a 1.2,1.6 0 1,0 0,-3.2
             Z
             M12.5,10.6
             a 0.4,0.7 0 1,0 0,1.4
             a 0.4,0.7 0 1,0 0,-1.4
             Z"/>
    <rect x="14"   y="9.5" width="1.2" height="3.2" rx="0.2"/>
    <path d="M12.5,4.5
             a 1.2,1.6 0 1,0 0,3.2
             a 1.2,1.6 0 1,0 0,-3.2
             Z
             M12.5,5.6
             a 0.4,0.7 0 1,0 0,1.4
             a 0.4,0.7 0 1,0 0,-1.4
             Z"/>
    <rect x="14"   y="4.5" width="1.2" height="3.2" rx="0.2"/>
  </g>
</svg>
