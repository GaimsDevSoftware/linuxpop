<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Lowercase a: round body with right vertical stem, hollow interior -->
  <g fill="#f0f0f0" fill-rule="evenodd">
    <!-- Body: outer circle minus inner circle (donut) -->
    <path d="M7.5,4
             a 4.5,4.5 0 1,0 0,9
             a 4.5,4.5 0 1,0 0,-9
             Z
             M7.5,6.5
             a 2,2 0 1,0 0,4
             a 2,2 0 1,0 0,-4
             Z"/>
    <!-- Right stem -->
    <rect x="10.5" y="4" width="2.2" height="9.5" rx="0.4"/>
  </g>
</svg>
