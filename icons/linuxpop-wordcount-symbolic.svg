<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Stack of text lines (paragraph) + small counter dot in the corner -->
  <g fill="#f0f0f0">
    <!-- Three "text lines" of decreasing length -->
    <rect x="1.5" y="3"  width="13"   height="1.7" rx="0.4"/>
    <rect x="1.5" y="6"  width="10.5" height="1.7" rx="0.4"/>
    <rect x="1.5" y="9"  width="12"   height="1.7" rx="0.4"/>
    <rect x="1.5" y="12" width="7"    height="1.7" rx="0.4"/>
    <!-- Small "count" badge in lower-right corner -->
    <circle cx="13" cy="12.8" r="2.5"/>
    <circle cx="13" cy="12.8" r="1.3" fill="#2b2b2b"/>
  </g>
</svg>
