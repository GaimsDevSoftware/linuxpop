<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- LinuxPop "video search" mark — pure white play triangle on the
       house cobalt→violet gradient. NOT a reproduction of YouTube's
       red play button; this is a LinuxPop-branded video search button.
       Sits naturally next to the other linuxpop-* AI/search icons. -->
  <defs>
    <linearGradient id="lpvid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5B7DF5"/>
      <stop offset="55%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="24" height="24" rx="5" fill="url(#lpvid)"/>
  <!-- White play triangle, centred, with rounded corners so it reads
       as a clean modern mark rather than a sharp 90s-style arrow. -->
  <path d="M9.0,7.4
           L17.2,11.5
           C17.9,11.85 17.9,12.15 17.2,12.5
           L9.0,16.6
           C8.4,16.9 7.8,16.5 7.8,15.85
           L7.8,8.15
           C7.8,7.5 8.4,7.1 9.0,7.4 Z"
        fill="#ffffff"/>
</svg>
