<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Title Case: a small capital A next to a small lowercase a -->
  <g fill="#f0f0f0" fill-rule="evenodd">
    <!-- Capital A (left half) -->
    <path d="M0.5,14
             L3,2.5
             L4.5,2.5
             L7,14
             L5.5,14
             L5,11.5
             L2.5,11.5
             L2,14
             Z
             M2.8,9.5
             L4.7,9.5
             L3.75,5
             Z"/>
    <!-- Lowercase a (right half): donut body + stem -->
    <path d="M11,7
             a 2.6,2.6 0 1,0 0,5.2
             a 2.6,2.6 0 1,0 0,-5.2
             Z
             M11,8.6
             a 1,1 0 1,0 0,2
             a 1,1 0 1,0 0,-2
             Z"/>
    <rect x="13" y="7" width="1.5" height="5.6" rx="0.3"/>
  </g>
</svg>
