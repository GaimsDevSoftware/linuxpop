<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Stylized infinity-ring inspired mark on Perplexity's teal - original
       composition, not a logo reproduction. -->
  <rect x="0" y="0" width="24" height="24" rx="5" fill="#20808D"/>
  <g fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Two interlocking arcs forming a stylized lens / lookup glyph -->
    <path d="M5,12
             a4,4 0 0 1 7,-2.5
             a4,4 0 0 1 7,2.5
             a4,4 0 0 1 -7,2.5
             a4,4 0 0 1 -7,-2.5 Z"/>
    <!-- Central dot suggesting the "search" focal point -->
  </g>
  <circle cx="12" cy="12" r="1.4" fill="#ffffff"/>
</svg>
