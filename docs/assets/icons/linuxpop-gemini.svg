<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Four-point sparkle on a Google-blue → violet gradient -->
  <defs>
    <linearGradient id="gemBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#9B72CB"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="24" height="24" rx="5" fill="url(#gemBg)"/>
  <!-- Big sparkle -->
  <path fill="#ffffff"
        d="M12,3
           C12,7 13,8 17,9
           C13,10 12,11 12,15
           C12,11 11,10 7,9
           C11,8 12,7 12,3 Z"/>
  <!-- Small companion sparkle -->
  <path fill="#ffffff" opacity="0.9"
        d="M18,15
           C18,17 18.5,17.5 20.5,18
           C18.5,18.5 18,19 18,21
           C18,19 17.5,18.5 15.5,18
           C17.5,17.5 18,17 18,15 Z"/>
</svg>
