<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Search-with-sparkle: a magnifier mark plus a four-point sparkle to
       hint at AI augmentation. Background uses Google's signature four
       colours (red / yellow / green / blue) as a gradient. -->
  <defs>
    <linearGradient id="goog" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4285F4"/>
      <stop offset="33%"  stop-color="#34A853"/>
      <stop offset="66%"  stop-color="#FBBC05"/>
      <stop offset="100%" stop-color="#EA4335"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="24" height="24" rx="5" fill="url(#goog)"/>
  <!-- Magnifier circle + handle -->
  <g fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round">
    <circle cx="10" cy="10" r="4.2"/>
    <line x1="13.5" y1="13.5" x2="16.5" y2="16.5"/>
  </g>
  <!-- Small 4-point sparkle in the upper-right of the magnifier -->
  <path fill="#ffffff"
        d="M17.5,5
           C17.5,6.4 17.9,6.8 19.3,6.8
           C17.9,6.8 17.5,7.2 17.5,8.6
           C17.5,7.2 17.1,6.8 15.7,6.8
           C17.1,6.8 17.5,6.4 17.5,5 Z"/>
</svg>
