<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Ko-fi profile picture for LinuxPop. Chunky variant of the app icon. -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#5B7DF5"/>
  <!-- Subtle inner edge to give depth, still renders without filters -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="none"
        stroke="#4A6CE3" stroke-width="2"/>

  <!-- White popup pill -->
  <rect x="96" y="176" width="320" height="160" rx="36" fill="#FFFFFF"/>
  <rect x="96" y="176" width="320" height="160" rx="36" fill="none"
        stroke="#D0D5E0" stroke-width="2"/>

  <!-- Three action dots -->
  <circle cx="176" cy="256" r="32" fill="#5B7DF5"/>
  <circle cx="256" cy="256" r="32" fill="#7C3AED"/>
  <circle cx="336" cy="256" r="32" fill="#EC4899"/>
</svg>
